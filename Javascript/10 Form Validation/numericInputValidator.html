<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeric Input Validation</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .number-validation { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); width: 400px; }
        h1 { color: #f5576c; text-align: center; }
        label { font-weight: bold; color: #333; }
        input[type="text"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1em; box-sizing: border-box; }
        input[type="submit"] { width: 100%; padding: 15px; background: #f5576c; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; }
        input[type="submit"]:hover { background: #d63957; }
        #numericFeedback { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>
    <div class="number-validation">
        <h1>🔢 Number Validator</h1>
        <form onsubmit="return validateNumericInput();">
            <label>Enter your age:</label>
            <input type="text" id="numericField" placeholder="Enter a number">
            <input type="submit" value="Check Number">
        </form>
        <div id="numericFeedback"></div>
        <script>
            function validateNumericInput() {
                let enteredValue = document.getElementById("numericField").value;
                let feedbackBox = document.getElementById("numericFeedback");
                
                if (enteredValue.trim() === "") {
                    feedbackBox.innerHTML = "⚠️ Field cannot be empty! Please enter a value.";
                    feedbackBox.className = "error";
                    return false;
                }
                
                if (isNaN(enteredValue)) {
                    feedbackBox.innerHTML = "❌ Invalid input! Only numeric characters are allowed.";
                    feedbackBox.className = "error";
                    return false;
                }
                
                feedbackBox.innerHTML = "✅ Valid number entered! Age: " + enteredValue;
                feedbackBox.className = "success";
                return true;
            }
        </script>
    </div>
</body>
</html>
