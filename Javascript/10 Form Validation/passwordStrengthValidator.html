<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Validator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .password-form { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); width: 420px; }
        h1 { color: #11998e; text-align: center; }
        label { font-weight: bold; color: #333; }
        input[type="password"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1em; box-sizing: border-box; }
        input[type="submit"] { width: 100%; padding: 15px; background: #11998e; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 10px; }
        input[type="submit"]:hover { background: #0e7a6e; }
        #passwordFeedback { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>
    <div class="password-form">
        <h1>🔐 Password Validator</h1>
        <form onsubmit="return validateUserPassword();">
            <label>Create your password:</label>
            <input type="password" id="userPassword" placeholder="Enter password (min 6 characters)">
            <input type="submit" value="Verify Password">
        </form>
        <div id="passwordFeedback"></div>
        <script>
            function validateUserPassword() {
                let passwordValue = document.getElementById("userPassword").value;
                let feedbackDisplay = document.getElementById("passwordFeedback");
                
                if (passwordValue === "") {
                    feedbackDisplay.innerHTML = "⚠️ Password cannot be empty!";
                    feedbackDisplay.className = "error";
                    return false;
                }
                
                if (passwordValue.length < 6) {
                    feedbackDisplay.innerHTML = "❌ Password is too weak! Must be at least 6 characters long.";
                    feedbackDisplay.className = "error";
                    return false;
                }
                
                feedbackDisplay.innerHTML = "✅ Strong password accepted! Your account is secure.";
                feedbackDisplay.className = "success";
                return true;
            }
        </script>
    </div>
</body>
</html>
