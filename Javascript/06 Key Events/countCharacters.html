<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Character Counter</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .char-counter { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 450px; }
        h1 { color: #667eea; text-align: center; }
        input[type="text"] { width: 100%; padding: 15px; border: 3px solid #ddd; border-radius: 10px; font-size: 1.1em; box-sizing: border-box; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #667eea; outline: none; }
        .counter-display { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: center; font-size: 1.3em; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="char-counter">
        <h1>📝 Text Input Character Counter</h1>
        <input type="text" id="userInput" placeholder="Type something here..." onkeyup="calculateCharacters(event)">
        <div class="counter-display" id="charCount">Characters typed: 0</div>
        <script>
            function calculateCharacters(keyboardEvent) {
                let enteredText = keyboardEvent.target.value;
                let characterCount = enteredText.length;
                document.getElementById("charCount").innerHTML = "Characters typed: " + characterCount;
            }
        </script>
    </div>
</body>
</html>
