<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Press - Background Changer</title>
    <style>
        body { font-family: 'Roboto', sans-serif; transition: background-color 0.4s ease; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .keypress-container { background: white; padding: 60px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center; }
        h1 { color: #2c3e50; }
        .hint { font-size: 1.2em; color: #7f8c8d; margin-top: 20px; }
        .color-indicator { margin-top: 30px; padding: 15px; background: #ecf0f1; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body onkeydown="changeBackgroundColor()">
    <div class="keypress-container">
        <h1>⌨️ Keyboard Event Demo</h1>
        <p class="hint">Press any key on your keyboard to change the background color</p>
        <div class="color-indicator" id="colorStatus">Current Background: White</div>
        <script>
            let colorIndex = 0;
            const colorPalette = ["#87CEEB", "#FFB6C1", "#98FB98", "#DDA0DD", "#F0E68C", "#FFFFFF"];
            
            function changeBackgroundColor() {
                colorIndex = (colorIndex + 1) % colorPalette.length;
                document.body.style.backgroundColor = colorPalette[colorIndex];
                document.getElementById("colorStatus").innerHTML = "Current Background: " + colorPalette[colorIndex];
            }
        </script>
    </div>
</body>
</html>
