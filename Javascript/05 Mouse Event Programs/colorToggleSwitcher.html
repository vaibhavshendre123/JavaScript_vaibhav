<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Background Color Switcher</title>
    <style>
        body { font-family: 'Arial', sans-serif; transition: background-color 0.5s ease; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .color-toggle-panel { background: rgba(255,255,255,0.9); padding: 50px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
        h1 { color: #333; }
        .instruction { font-size: 1.2em; color: #666; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="color-toggle-panel">
        <h1>🎨 Background Color Toggle</h1>
        <p class="instruction">Click anywhere on the page to change background color</p>
        <script>
            let colorState = false;
            
            document.addEventListener("click", function(clickEvent) {
                if (colorState) {
                    document.body.style.backgroundColor = "#ffffff";
                } else {
                    document.body.style.backgroundColor = "#98fb98";
                }
                colorState = !colorState;
            });
        </script>
    </div>
</body>
</html>
