<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Hover Interaction</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0e5ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .hover-trigger { background: linear-gradient(145deg, #ffffff, #e6e6e6); padding: 30px 60px; border-radius: 15px; box-shadow: 10px 10px 20px #b8b9be, -10px -10px 20px #ffffff; cursor: pointer; transition: all 0.3s ease; }
        .hover-trigger:hover { transform: translateY(-5px); box-shadow: 15px 15px 30px #b8b9be, -15px -15px 30px #ffffff; }
        #feedback-text { margin-top: 30px; font-size: 1.3em; color: #4a90d9; font-weight: bold; min-height: 40px; }
    </style>
</head>
<body>
    <div>
        <div class="hover-trigger" onmouseover="handleMouseOver()" onmouseout="handleMouseOut()">
            <h2>🖱️ Hover Over Me</h2>
            <p>Move your mouse cursor here</p>
        </div>
        <div id="feedback-text"></div>
        <script>
            function handleMouseOver() {
                document.getElementById("feedback-text").innerHTML = "✨ Mouse is now hovering over the button!";
                document.getElementById("feedback-text").style.color = "#27ae60";
            }
            
            function handleMouseOut() {
                document.getElementById("feedback-text").innerHTML = "👋 Mouse left the button area";
                document.getElementById("feedback-text").style.color = "#e74c3c";
            }
        </script>
    </div>
</body>
</html>
