<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Username Validation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ff9966; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .registration-form { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 380px; }
        h1 { text-align: center; color: #ff5e62; }
        .validation-result { margin-top: 25px; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; }
        .valid { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .invalid { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    </style>
</head>
<body>
    <div class="registration-form">
        <h1>👤 Username Validator</h1>
        <script>
            let userIdentifier = prompt("Create your username for registration:");
            
            try {
                if (userIdentifier === null || userIdentifier.trim() === "") {
                    throw "Username cannot be empty! Please enter a valid username.";
                }
                document.write('<div class="validation-result valid">✅ Username "' + userIdentifier + '" has been registered successfully!</div>');
            } catch (validationError) {
                document.write('<div class="validation-result invalid">❌ ' + validationError + '</div>');
            } finally {
                document.write('<p style="text-align:center;color:#666;margin-top:20px;">Process completed</p>');
            }
        </script>
    </div>
</body>
</html>
