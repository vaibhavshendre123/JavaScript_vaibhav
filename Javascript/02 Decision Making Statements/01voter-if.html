<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Eligibility Check</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .result { font-size: 1.5em; font-weight: bold; color: #27ae60; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Voter Eligibility Checker</h1>
        <script>
            const candidateAge = parseInt(prompt("Enter your age to check voting eligibility:"));
            if (candidateAge >= 18) {
                document.write('<div class="result">Congratulations! You are eligible to vote in elections.</div>');
            }
        </script>
    </div>
</body>
</html>
