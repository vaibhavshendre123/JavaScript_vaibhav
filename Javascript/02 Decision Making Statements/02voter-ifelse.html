<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification System</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #ffecd2; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #d35400; }
        #output { margin-top: 25px; font-size: 1.2em; font-weight: 600; }
        .eligible { color: #27ae60; }
        .not-eligible { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Age Verification</h1>
        <script>
            const userAge = parseInt(prompt("Enter your age:"));
            if (userAge >= 18) {
                document.getElementById("output").innerHTML = '<span class="eligible">Access Granted - You are 18 or older!</span>';
            } else {
                document.getElementById("output").innerHTML = '<span class="not-eligible">Access Denied - You must be 18 or older.</span>';
            }
        </script>
    </div>
</body>
</html>
